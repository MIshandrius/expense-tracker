<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        /* ── CSS Variables ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-brand {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--accent);
            text-decoration: none;
        }
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            color: var(--text);
            background: var(--card);
        }

        /* ── Main container ── */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.55rem 1.2rem;
            border-radius: 8px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.18s;
        }
        .btn-primary {
            background: var(--accent);
            color: #0e0e12;
        }
        .btn-primary:hover { background: #6fb149; transform: translateY(-1px); }
        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
        .btn-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid transparent;
        }
        .btn-danger:hover { background: rgba(255,92,92,0.1); border-color: var(--danger); }

        /* ── Form elements ── */
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        input, select, textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: var(--font);
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
        }
        textarea { resize: vertical; min-height: 80px; }
        select option { background: var(--card); }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
        }

        /* ── Alert ── */
        .alert-error {
            background: rgba(255,92,92,0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }

        /* ── Page title ── */
        .page-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1.75rem;
            letter-spacing: -0.5px;
        }
        .page-title span { color: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <a class="nav-brand" href="/">Expense Tracker :3</a>
        <div class="nav-links">
            <a href="/">All Expenses</a>
            <a href="/add">+ Add New</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
