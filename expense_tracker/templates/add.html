{% extends "base.html" %}

{% block content %}

<div style="max-width:520px;">
    <a href="/" class="btn btn-ghost" style="margin-bottom:1.5rem; display:inline-flex;">← Back</a>
    <h1 class="page-title">Add <span>Expense</span></h1>

    {% if error %}
    <div class="alert-error">⚠ {{ error }}</div>
    {% endif %}

    <div class="card">
        <form method="POST" action="/add">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" placeholder="e.g. Grocery shopping" required>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                <div class="form-group">
                    <label for="amount">Amount (t) *</label>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label for="date">Date *</label>
                    <input type="date" id="date" name="date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select category</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Entertainment</option>
                    <option>Health</option>
                    <option>Shopping</option>
                    <option>Bills</option>
                    <option>Education</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="note">Note (optional)</label>
                <textarea id="note" name="note" placeholder="Any extra details..."></textarea>
            </div>

            <div style="display:flex; gap:0.75rem; justify-content:flex-end; margin-top:0.5rem;">
                <a href="/" class="btn btn-ghost">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Expense</button>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById("date").valueAsDate = new Date();
</script>

{% endblock %}
